<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймеры забегов</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Таймеры забегов</h1>
        </header>
        
        <div class="tabs-container">
            <div class="tabs-header">
                <div class="tabs-list" id="tabsList">
                    <!-- Вкладки будут добавляться динамически -->
                </div>
                <button class="add-tab-btn" id="addTabBtn" title="Добавить забег">+</button>
            </div>
            
            <div class="tabs-content" id="tabsContent">
                <!-- Содержимое вкладок будет добавляться динамически -->
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
